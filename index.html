<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#241812">
<title>TradeVale</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- shown only in portrait; the game itself is landscape-only -->
<div id="rotateNotice">
  <div class="icon">⟳</div>
  <h2>Rotate your device</h2>
  <p>TradeVale plays best in landscape mode.</p>
</div>

<div id="app">

  <!-- ===================== LEFT: MENU / CONTROLS ===================== -->
  <div id="menuPanel">
    <div class="brand">
      <h1>TradeVale</h1>
      <span class="tag">OFFLINE MARKET</span>
    </div>

    <div id="statusStrip">
      <span>Trader's License: <b>Active</b></span>
      <span class="coins">⛁ Free Play</span>
    </div>

    <div id="zoneLabel">Trading Plaza</div>

    <div id="dialogueBox" class="empty">Walk up to someone and tap the talk button.</div>

    <div id="minimapWrap">
      <div class="mmTitle">MAP — TRADEVALE</div>
      <div id="minimap"></div>
    </div>

    <div class="spacer"></div>

    <div id="controls">
      <div id="joystickZone">
        <div id="joystickKnob"></div>
      </div>

      <div class="dpad" id="dpad" style="display:none;">
        <button class="up" data-dir="up">▲</button>
        <button class="left" data-dir="left">◀</button>
        <div class="center"></div>
        <button class="right" data-dir="right">▶</button>
        <button class="down" data-dir="down">▼</button>
      </div>

      <button id="interactBtn">TALK</button>
    </div>

    <button id="controlModeToggle">Switch to D-Pad</button>
  </div>

  <!-- ===================== RIGHT: 2D CITY VIEW ===================== -->
  <div id="viewport">
    <canvas id="gameCanvas"></canvas>
    <div id="speechBubble"></div>
    <div id="zoneToast"></div>
    <div id="lockedToast"></div>
  </div>

</div>

<!-- ===================== DATA FILES ===================== -->
<script src="js/map.js"></script>
<script src="js/engine_draw.js"></script>

<!-- ===================== ONE FILE PER BOT ===================== -->
<script src="js/bots/merchant_joe.js"></script>
<script src="js/bots/pawn_mira.js"></script>
<script src="js/bots/auction_dex.js"></script>
<script src="js/bots/thrift_nan.js"></script>
<script src="js/bots/gramps.js"></script>
<script src="js/bots/fisher_dock.js"></script>
<script src="js/bots/barista_luu.js"></script>

<!-- ===================== ENGINE ===================== -->
<script src="js/controls.js"></script>
<script src="js/main.js"></script>

</body>
</html>
